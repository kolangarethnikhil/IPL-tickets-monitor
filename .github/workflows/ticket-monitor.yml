name: IPL Ticket Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor-tickets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create data directory
        run: |
          mkdir -p data
      
      - name: Restore previous data
        uses: actions/cache@v3
        with:
          path: data/
          key: ipl-data-${{ github.run_id }}
          restore-keys: |
            ipl-data-
      
      - name: Run ticket check
        if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd src
          python monitor.py check
      
      - name: Send heartbeat
        if: github.event.schedule == '0 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd src
          python monitor.py heartbeat
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update ticket data - $(date)"
          git push
        continue-on-error: true
